<!DOCTYPE html>
<html lang="{{ config.get('UI_LANG', 'fr') }}" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MetaKavita Statistiques</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script>
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
</head>
<body>
    <div class="dashboard-wrapper">
        <header class="topbar">
            <div class="logo">
                <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo" class="logo-img">
                MetaKavita - Statistiques
            </div>
            <div class="topbar-actions">
                <a href="/" class="btn-primary block-link">{{ t.stats_back }}</a>
            </div>
        </header>

        <main class="content" style="align-items: center; justify-content: center;">
            <div class="card" style="width: 100%; max-width: 600px; text-align: center; padding: 40px;">
                <h2 class="section-title" style="font-size: 24px;">{{ t.stats_global }}</h2>
                
                <div style="display: flex; justify-content: space-around; margin-top: 30px;">
                    <div>
                        <h1 style="color: var(--primary); font-size: 3.5rem; margin: 0;">{{ total }}</h1>
                        <p class="text-muted" style="font-weight: 600; font-size: 16px;">{{ t.stats_cache }}</p>
                    </div>
                    <div>
                        <h1 style="color: var(--success); font-size: 3.5rem; margin: 0;">{{ completed }}</h1>
                        <p class="text-muted" style="font-weight: 600; font-size: 16px;">{{ t.stats_ok }}</p>
                    </div>
                </div>
                
                <div style="display: flex; justify-content: space-around; margin-top: 30px;">
                    <div>
                        <h1 style="color: var(--warning); font-size: 3.5rem; margin: 0;">{{ pending }}</h1>
                        <p class="text-muted" style="font-weight: 600; font-size: 16px;">{{ t.stats_wait }}</p>
                    </div>
                    <div>
                        <h1 style="color: var(--danger); font-size: 3.5rem; margin: 0;">{{ not_found }}</h1>
                        <p class="text-muted" style="font-weight: 600; font-size: 16px;">{{ t.stats_err }}</p>
                    </div>
                </div>
                
                <div class="mt-3" style="margin-top: 40px !important;">
                    <div style="width: 100%; background: var(--bg-input); height: 25px; border-radius: 15px; overflow: hidden; display: flex;">
                        {% if total > 0 %}
                        <div style="width: {{ (completed / total) * 100 }}%; background: var(--success);" title="Complétées"></div>
                        <div style="width: {{ (not_found / total) * 100 }}%; background: var(--danger);" title="Introuvables"></div>
                        <div style="width: {{ (pending / total) * 100 }}%; background: var(--warning);" title="En Attente"></div>
                        {% endif %}
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
